<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="1"/>
      <stop offset="70%" stop-color="#6366f1" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0.8"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#6366f1" flood-opacity="0.6"/>
    </filter>
  </defs>
  <!-- Outer glow ring -->
  <circle cx="64" cy="64" r="56" fill="none" stroke="#6366f1" stroke-width="2" stroke-opacity="0.4"/>
  <!-- Main circle -->
  <circle cx="64" cy="64" r="44" fill="url(#glow)" filter="url(#shadow)"/>
  <!-- Inner white ring -->
  <circle cx="64" cy="64" r="36" fill="none" stroke="white" stroke-width="3" stroke-opacity="0.8"/>
  <!-- Center dot -->
  <circle cx="64" cy="64" r="10" fill="white" fill-opacity="0.95"/>
  <!-- Cursor arrow shape -->
  <path d="M48 44 L48 80 L58 70 L64 84 L70 81 L64 67 L76 67 Z"
        fill="white" fill-opacity="0.9"/>
