<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShadowCursor — Settings</title>
  <link rel="stylesheet" href="options.css" />
</head>
<body>
  <div class="options">
    <header class="options__header">
      <img src="assets/icon-48.png" alt="ShadowCursor" />
      <div>
        <h1>ShadowCursor Settings</h1>
        <p>Configure your AI copilot</p>
      </div>
    </header>

    <main class="options__body">
      <!-- Mode -->
      <section class="card">
        <h2>Mode</h2>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="mode" value="byok" />
            <span>BYOK — Bring Your Own Key</span>
            <small>Use your own API key. No subscription required.</small>
          </label>
          <label class="radio-label">
            <input type="radio" name="mode" value="pro" />
            <span>Managed Proxy</span>
            <small>Use a separately hosted proxy if your deployment provides one.</small>
          </label>
        </div>
      </section>

      <!-- BYOK Config -->
      <section class="card" id="byok-section">
        <h2>LLM Provider</h2>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="provider" value="claude" />
            <span>Claude (Anthropic)</span>
          </label>
          <label class="radio-label">
            <input type="radio" name="provider" value="openai" />
            <span>GPT-4o (OpenAI)</span>
          </label>
        </div>

        <div class="field">
          <label for="api-key">LLM API Key</label>
          <input type="password" id="api-key" placeholder="sk-ant-... or sk-..." autocomplete="off" />
        </div>

        <h2 style="margin-top:20px">Speech-to-Text</h2>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="stt" value="whisper" />
            <span>Whisper (OpenAI)</span>
          </label>
          <label class="radio-label">
            <input type="radio" name="stt" value="deepgram" />
            <span>Deepgram Nova-2</span>
          </label>
        </div>

        <div class="field" id="stt-key-field">
          <label for="stt-key">STT API Key <small>(if different from above)</small></label>
          <input type="password" id="stt-key" placeholder="Optional — uses LLM key if blank" autocomplete="off" />
        </div>
      </section>

      <!-- Trigger -->
      <section class="card">
        <h2>Trigger</h2>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="trigger" value="keyboard" checked />
            <span>Keyboard Shortcut <span class="badge">Only Option</span></span>
            <small>Press <strong>Cmd+Shift+K</strong> on macOS or <strong>Ctrl+Shift+K</strong> on other systems to start recording.</small>
          </label>
        </div>
      </section>

      <!-- Behavior -->
      <section class="card">
        <h2>Behavior</h2>
        <label class="toggle-label">
          <input type="checkbox" id="auto-click" />
          <span>Auto-execute actions</span>
          <small>When off, ShadowCursor only highlights targets.</small>
        </label>
        <label class="toggle-label">
          <input type="checkbox" id="confirm-destructive" />
          <span>Confirm destructive actions</span>
          <small>Pause before delete / terminate / remove steps.</small>
        </label>
      </section>

      <!-- Usage -->
      <section class="card" id="usage-section">
        <h2>Usage</h2>
        <p id="usage-text" class="muted">Loading…</p>
      </section>
    </main>

    <footer class="options__footer">
      <span id="save-status" class="save-status"></span>
      <button id="btn-save" class="btn btn--primary">Save Settings</button>
    </footer>
  </div>
  <script src="options.js"></script>
</body>
</html>
